name: APK Size Analysis with Diffuse

on:
  pull_request:
    branches: [ "main" ]

jobs:
  diffuse:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write  # Required to post comments

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history to detect changed files

      - name: Check file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**/*.kt'
              - '**/*.kts'
              - '**/gradle.properties'
              - '**/libs.versions.toml'
              - '**/*.pro'
              - '**/AndroidManifest.xml'
              - '**/res/**'
              - '**/assets/**'

      - name: Skip analysis notification
        if: steps.filter.outputs.src != 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📊 APK Size Analysis
            
            No changes that affect APK size detected. Skip analysis.
            
            ---
            _Generated by [Diffuse](https://github.com/JakeWharton/diffuse) via [diffuse-action](https://github.com/usefulness/diffuse-action)_

      - name: Set up JDK 23
        if: steps.filter.outputs.src == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      # Android SDK setup for GitHub Actions
      # https://github.com/android-actions/setup-android
      - name: Setup Android SDK
        if: steps.filter.outputs.src == 'true'
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        if: steps.filter.outputs.src == 'true'
        uses: gradle/actions/setup-gradle@v6

      # Build base APK from main branch
      # Note: These are debug-signed APKs (using debug keystore fallback) for size comparison
      - name: Checkout main branch
        if: steps.filter.outputs.src == 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          path: main-branch

      - name: Build base APK from main
        if: steps.filter.outputs.src == 'true'
        run: |
          cd main-branch
          ./gradlew assembleProdRelease --parallel --daemon
          cp app/build/outputs/apk/prod/release/app-prod-release.apk ../base.apk
          cd ..

      # Stop Gradle daemon to avoid cross-directory caching issues
      - name: Stop Gradle daemon
        if: steps.filter.outputs.src == 'true'
        run: ./gradlew --stop

      # Build PR APK
      - name: Build PR APK
        if: steps.filter.outputs.src == 'true'
        run: ./gradlew assembleProdRelease --parallel --daemon

      - name: List APK outputs
        if: steps.filter.outputs.src == 'true'
        run: |
          echo "Listing APK outputs:"
          find app/build/outputs/apk -name "*.apk"

      # Run Diffuse comparison using the action
      - name: Run Diffuse
        if: steps.filter.outputs.src == 'true'
        id: diffuse
        uses: usefulness/diffuse-action@v1
        continue-on-error: true
        with:
          old-file-path: base.apk
          new-file-path: app/build/outputs/apk/prod/release/app-prod-release.apk

      # Post or update comment on PR
      - name: Find existing Diffuse comment
        if: steps.filter.outputs.src == 'true'
        uses: peter-evans/find-comment@v4
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: '📊 APK Size Analysis'

      - name: Create or update PR comment
        if: steps.filter.outputs.src == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 📊 APK Size Analysis
            
            Comparing `${{ github.base_ref }}` (base) → `${{ github.head_ref }}` (this PR)
            
            ${{ steps.diffuse.outputs.diff-gh-comment || '⚠️ Diffuse analysis failed. Check the workflow logs for details.' }}
            
            ---
            _Generated by [Diffuse](https://github.com/JakeWharton/diffuse) via [diffuse-action](https://github.com/usefulness/diffuse-action)_

      # Upload APKs as artifacts for manual inspection
      - name: Upload APKs
        if: steps.filter.outputs.src == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: apks-comparison
          path: |
            base.apk
            app/build/outputs/apk/prod/release/app-prod-release.apk
          retention-days: 7
